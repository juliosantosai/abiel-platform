name: Architecture Fitness

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  architecture-fitness:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate wrapper inventory
        run: npm run arch:inventory:wrappers

      - name: Run architecture checks (strict)
        run: npm run arch:check:strict
